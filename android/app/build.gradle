plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}
// Optional local overrides (gitignored): key/signing.local.properties
def localSigningFile = rootProject.file('../key/signing.local.properties')
if (localSigningFile.exists()) {
    keystoreProperties.load(new FileInputStream(localSigningFile))
}
// Environment overrides (CI / one-off builds without editing files)
def envStorePassword = System.getenv('ALDUA_STORE_PASSWORD')
def envKeyPassword = System.getenv('ALDUA_KEY_PASSWORD')
def envKeyAlias = System.getenv('ALDUA_KEY_ALIAS')
if (envStorePassword) keystoreProperties['storePassword'] = envStorePassword
if (envKeyPassword) keystoreProperties['keyPassword'] = envKeyPassword
if (envKeyAlias) keystoreProperties['keyAlias'] = envKeyAlias

android {
    namespace "com.devtechnologies.aldua"
    compileSdkVersion 36
    // NDK r28+ — 16 KB ELF alignment (Google Play requirement for Android 15+).
    ndkVersion flutter.ndkVersion

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17.toString()
    }

    defaultConfig {
        applicationId "com.devtechnologies.aldua"
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion 36
        versionCode flutter.versionCode
        versionName flutter.versionName
    }

    bundle {
        abi { enableSplit = true }
        density { enableSplit = true }
        language { enableSplit = true }
    }

    // Uncompressed native libs zip-aligned for 16 KB devices (AGP 8.5.1+).
    packaging {
        jniLibs {
            useLegacyPackaging = false
        }
    }

    def releaseKeystoreFile = keystoreProperties['storeFile'] != null
        ? rootProject.file(keystoreProperties['storeFile'])
        : null

     signingConfigs {
        release {
            keyAlias keystoreProperties['keyAlias']
            keyPassword keystoreProperties['keyPassword']
            storeFile releaseKeystoreFile
            storePassword keystoreProperties['storePassword']
        }
    }
    buildTypes {
        release {
            def hasReleaseKeystore = keystorePropertiesFile.exists() &&
                releaseKeystoreFile != null &&
                releaseKeystoreFile.exists()
            signingConfig hasReleaseKeystore
                ? signingConfigs.release
                : signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            proguardFiles(
                getDefaultProguardFile('proguard-android-optimize.txt'),
                'proguard-rules.pro'
            )
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.5'
}
